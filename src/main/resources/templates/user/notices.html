<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社区公告 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        .notice-card {
            background: white;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 15px;
        }
        .notice-header {
            margin-bottom: 10px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 10px;
        }
        .notice-title {
            font-size: 16px;
            margin: 0 0 5px 0;
        }
        .notice-meta {
            font-size: 12px;
            color: #666;
        }
        .notice-body {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>社区公告</h1>
        <a th:href="@{/}" style="color: white; text-decoration: none;">返回首页</a>
    </div>
    
    <div class="container">
        <div th:if="${#lists.isEmpty(notices)}" style="border: 1px solid #ccc; padding: 20px; text-align: center; color: #666;">
            目前没有新的公告通知
        </div>
        
        <div th:each="n : ${notices}" class="notice-card">
            <div class="notice-header">
                <h2 class="notice-title" th:text="${n.title}"></h2>
                <div class="notice-meta">
                    发布时间：<span th:if="${n.createTime != null}" th:text="${#temporals.format(n.createTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${n.createTime != null}">-</span>
                    | 发布人：<span th:text="${n.publisherName}"></span>
                </div>
            </div>
            <div class="notice-body" th:text="${n.content}"></div>
        </div>
    </div>
</body>
</html>
