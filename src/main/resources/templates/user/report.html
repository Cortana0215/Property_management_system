<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>提交报修 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=3}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>智慧物业 - 住户端</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/}">服务大厅</a>
            <a th:href="@{/profile}">个人资料</a>
            <a th:href="@{/report}">设施报修</a>
            <a th:href="@{/complaints}">投诉建议</a>
            <a th:href="@{/notices}">社区公告</a>
            <a th:href="@{/services}">便民服务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出登录</a>
        </div>
    </div>
    <div class="content">

        <div class="card">
            <h2 style="margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">申报故障</h2>
            
            <form th:action="@{/report}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>报修人</label>
                    <input type="text" name="submitterName" th:value="${session.loggedInUser.name}" readonly style="background-color: #eee;">
                </div>
                
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="tel" name="contactPhone" th:value="${session.loggedInUser.phone}" required placeholder="请输入您的联系方式">
                </div>
                
                <div class="form-group">
                    <label>故障描述</label>
                    <textarea name="facilityDescription" required rows="4" placeholder="请说明损坏设施的具体位置及详细情况..."></textarea>
                </div>

                <div class="form-group">
                    <label>上传照片证据</label>
                    <input type="file" name="image" accept="image/*" style="border: none; padding: 0;">
                </div>
                
                <div style="margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="margin-left: 136px; padding: 12px 30px; margin-right: 15px;">提交报修工单</button>
                    <a th:href="@{/}" class="btn">取消返回</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
