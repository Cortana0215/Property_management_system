<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投诉建议 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
    <div class="navbar">
        <h1>我的投诉与建议</h1>
        <a th:href="@{/}" style="color: white; text-decoration: none;">返回首页</a>
    </div>
    
    <div class="container">
        <div style="margin-bottom: 20px;">
            <a th:href="@{/complaint/new}" class="btn-primary">新建投诉/建议</a>
        </div>

        <div th:if="${#lists.isEmpty(complaints)}" style="border: 1px solid #ccc; padding: 20px; text-align: center; color: #666;">
            暂无历史投诉与建议记录
        </div>
        
        <div th:each="c : ${complaints}" class="request-card">
            <div th:class="'status-tag ' + ${c.status == 'RESOLVED' ? 'status-completed' : 'status-pending'}" 
                 th:text="${c.status == 'PENDING' ? '待处理' : (c.status == 'PROCESSING' ? '处理中' : '已解决')}"></div>
            
            <h3 th:text="${c.title}">标题</h3>
            <p th:text="${c.content}" style="font-size: 14px; margin: 10px 0;"></p>
            <div style="font-size: 12px; color: #666;">提交时间：<span th:if="${c.submitTime != null}" th:text="${#temporals.format(c.submitTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${c.submitTime != null}">-</span></div>
            
            <div th:if="${c.status == 'RESOLVED'}" style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <div style="font-size: 14px; margin-bottom: 5px;"><strong>物业回复：</strong></div>
                <div th:text="${c.resultFeedback}" style="font-size: 14px; color: #333;">回复内容...</div>
            </div>
        </div>
    </div>
</body>
</html>
