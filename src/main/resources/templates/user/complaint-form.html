<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新建投诉建议 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=6}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>智慧物业 - 住户端</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/}">服务大厅</a>
            <a th:href="@{/profile}">个人资料</a>
            <a th:href="@{/report}">设施报修</a>
            <a th:href="@{/complaints}">投诉建议</a>
            <a th:href="@{/notices}">社区公告</a>
            <a th:href="@{/services}">便民服务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出登录</a>
        </div>
    </div>
    <div class="content">

        <div class="card">
            <h2 style="margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">写下您的反馈</h2>
            
            <form th:action="@{/complaint/submit}" method="post">
                <div class="form-group">
                    <label>主题摘要</label>
                    <input type="text" name="title" required placeholder="如：电梯卫生建议、邻里噪音投诉等">
                </div>
                
                <div class="form-group">
                    <label>详细内容</label>
                    <textarea name="content" rows="6" required placeholder="请详细描述您的问题或建议..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">确认提交反馈</button>
                    <a th:href="@{/complaints}" class="btn">取消返回</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
