<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误页面</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            background-color: white;
            padding: 60px 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            margin: 20px;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .error-code {
            font-size: 36px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        .error-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background-color: #4070f4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #3060e0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #ff6b6b;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        </div>
        <div class="error-code" th:text="${statusCode} ?: '404'">404</div>
        <div class="error-message" th:text="${errorMessage} ?: '页面未找到'">页面未找到</div>
        <div class="error-description" th:text="${errorDescription} ?: '您访问的页面不存在'">您访问的页面不存在</div>
        <a href="/login" class="btn">返回首页</a>
    </div>
</body>
</html>
