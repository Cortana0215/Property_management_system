<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>职工管理 - 物业管理系统</title>
    <link rel="stylesheet" th:href="@{/css/admin.css?v=6}">
</head>
<body>
    
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>物业管理系统</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/admin/dashboard}">仪表盘</a>
            <a th:href="@{/admin/buildings}">楼栋管理</a>
            <a th:href="@{/admin/rooms}">房屋管理</a>
            <a th:href="@{/admin/residents}">住户管理</a>
            <a th:href="@{/admin/staff}" class="active">职工管理</a>
            <a th:href="@{/admin/notices}">公告管理</a>
            <a th:href="@{/admin/complaints}">投诉管理</a>
            <a th:href="@{/admin/admins}">管理员账号</a>
            <a th:href="@{/admin/repairs}">报修任务</a>
            <a th:href="@{/attendance/records}">考勤管理</a>
            <a th:href="@{/admin/user-management}">用户账号管理</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出系统</a>
        </div>
    </div>
    <div class="content">


        <h1>职工信息管理</h1>
        
        <div class="card">
            <div class="card-title">添加新职工</div>
            <form th:action="@{/admin/staff/add}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="name" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="text" name="phone" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <label>登录账号</label>
                        <input type="text" name="username" placeholder="请输入账号" required>
                    </div>
                    <div class="form-group">
                        <label>登录密码</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">立即录入</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="card-title">职工名册</div>
            <table>
                <colgroup>
                    <col style="width: 10%;">
                    <col style="width: 25%;">
                    <col style="width: 25%;">
                    <col style="width: 25%;">
                    <col style="width: 15%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>联系电话</th>
                        <th>登录账号</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="staff : ${staffList}">
                        <td th:text="${staff.id}"></td>
                        <td th:text="${staff.name}"></td>
                        <td th:text="${staff.phone}"></td>
                        <td th:text="${staff.username}"></td>
                        <td>
                            <form th:action="@{/admin/staff/delete/{id}(id=${staff.id})}" method="post">
                                <button type="submit" class="btn btn-danger" onclick="return confirm('确定要删除该职工信息吗？')">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
