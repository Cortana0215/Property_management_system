<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>报修管理 - 物业管理系统</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .image-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid #edf2f7;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-PENDING { background: #fff9db; color: #f59f00; }
        .status-ASSIGNED { background: #e7f5ff; color: #228be6; }
        .status-COMPLETED { background: #ebfbee; color: #40c057; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>物业管理系统</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/admin/dashboard}">仪表盘</a>
            <a th:href="@{/admin/buildings}">楼栋管理</a>
            <a th:href="@{/admin/rooms}">房屋管理</a>
            <a th:href="@{/admin/residents}">住户管理</a>
            <a th:href="@{/admin/staff}">职工管理</a>
            <a th:href="@{/admin/admins}">管理员账号</a>
            <a th:href="@{/admin/repairs}" class="active">报修任务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出系统</a>
        </div>
    </div>

    <div class="content">
        <h1>报修任务流转管理</h1>

        <div class="card">
            <div class="card-title">所有工单</div>
            <table>
                <thead>
                    <tr>
                        <th>报修信息</th>
                        <th>现场照片</th>
                        <th>当前状态</th>
                        <th>处理人员</th>
                        <th>时间节点</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="repair : ${repairs}">
                        <td>
                            <div style="font-weight: 700;" th:text="${repair.facilityDescription}">描述</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);" th:text="${repair.submitterName} + ' (' + ${repair.contactPhone} + ')'">报修人</div>
                        </td>
                        <td>
                            <img th:if="${repair.imagePath}" th:src="${repair.imagePath}" class="image-preview" onclick="window.open(this.src)">
                            <span th:unless="${repair.imagePath}" style="color: #cbd5e0; font-size: 0.8rem;">无图片</span>
                        </td>
                        <td>
                            <span th:class="'status-pill status-' + ${repair.status}" th:text="${repair.status == 'PENDING' ? '待指派' : (repair.status == 'ASSIGNED' ? '处理中' : '已完成')}">状态</span>
                        </td>
                        <td th:text="${repair.staffName != null ? repair.staffName : '未指派'}">人员</td>
                        <td style="font-size: 0.75rem; color: var(--text-muted);">
                            <div>提: <span th:text="${#temporals.format(repair.submitTime, 'MM-dd HH:mm')}"></span></div>
                            <div th:if="${repair.completeTime}">完: <span th:text="${#temporals.format(repair.completeTime, 'MM-dd HH:mm')}"></span></div>
                        </td>
                        <td>
                            <div th:if="${repair.status == 'PENDING'}">
                                <form th:action="@{/admin/repairs/assign/{id}(id=${repair.id})}" method="post" style="display: flex; gap: 5px;">
                                    <select name="staffId" required style="padding: 4px; font-size: 0.8rem; width: 100px;">
                                        <option value="">指派职工</option>
                                        <option th:each="staff : ${staffList}" th:value="${staff.id}" th:text="${staff.name}"></option>
                                    </select>
                                    <button type="submit" class="btn btn-primary" style="padding: 4px 10px; font-size: 0.75rem;">确认指派</button>
                                </form>
                            </div>
                            <div th:if="${repair.status == 'COMPLETED'}">
                                <button class="btn" style="background: #f1f5f9; color: #475569; font-size: 0.75rem;" th:onclick="'alert(\'反馈内容：' + ${repair.staffFeedbackText} + '\')'">查看反馈</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
