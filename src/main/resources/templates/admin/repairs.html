<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>报修管理 - 物业管理系统</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .image-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>物业管理系统</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/admin/dashboard}">仪表盘</a>
            <a th:href="@{/admin/buildings}">楼栋管理</a>
            <a th:href="@{/admin/rooms}">房屋管理</a>
            <a th:href="@{/admin/residents}">住户管理</a>
            <a th:href="@{/admin/staff}">职工管理</a>
            <a th:href="@{/admin/notices}">公告管理</a>
            <a th:href="@{/admin/complaints}">投诉管理</a>
            <a th:href="@{/admin/admins}">管理员账号</a>
            <a th:href="@{/admin/repairs}" class="active">报修任务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出系统</a>
        </div>
    </div>

    <div class="content">
        <h1>报修任务流转管理</h1>

        <div class="card">
            <div class="card-title">所有工单</div>
            <table>
                <thead>
                    <tr>
                        <th>报修信息</th>
                        <th>现场照片</th>
                        <th>当前状态</th>
                        <th>处理人员</th>
                        <th>时间节点</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="repair : ${repairs}">
                        <td>
                            <strong th:text="${repair.facilityDescription}"></strong>
                            <div style="color: #666;" th:text="${repair.submitterName} + ' (' + ${repair.contactPhone} + ')'"></div>
                        </td>
                        <td>
                            <img th:if="${repair.imagePath}" th:src="${repair.imagePath}" class="image-preview" onclick="window.open(this.src)">
                            <span th:unless="${repair.imagePath}" style="color: #999;">无图片</span>
                        </td>
                        <td>
                            <span th:text="${repair.status == 'PENDING' ? '待指派' : (repair.status == 'ASSIGNED' ? '处理中' : '已完成')}"></span>
                        </td>
                        <td th:text="${repair.staffName != null ? repair.staffName : '未指派'}"></td>
                        <td>
                            <div th:if="${repair.rating != null}">
                                <strong th:text="${repair.rating} + ' 星'"></strong>
                                <div style="color: #666;" th:text="${repair.residentFeedback}"></div>
                            </div>
                            <span th:if="${repair.status == 'COMPLETED' && repair.rating == null}" style="color: #999;">暂无评价</span>
                        </td>
                        <td style="color: #666;">
                            <div>提: <span th:if="${repair.submitTime != null}" th:text="${#temporals.format(repair.submitTime, 'MM-dd HH:mm')}"></span><span th:unless="${repair.submitTime != null}">-</span></div>
                            <div th:if="${repair.completeTime}">完: <span th:if="${repair.completeTime != null}" th:text="${#temporals.format(repair.completeTime, 'MM-dd HH:mm')}"></span><span th:unless="${repair.completeTime != null}">-</span></div>
                        </td>
                        <td>
                            <div th:if="${repair.status == 'PENDING'}">
                                <form th:action="@{/admin/repairs/assign/{id}(id=${repair.id})}" method="post">
                                    <div class="form-group">
                                        <select name="staffId" required>
                                            <option value="">指派职工</option>
                                            <option th:each="staff : ${staffList}" th:value="${staff.id}" th:text="${staff.name}"></option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary">确认指派</button>
                                </form>
                            </div>
                            <div th:if="${repair.status == 'COMPLETED'}">
                                <button class="btn" 
                                        th:data-feedback="${repair.staffFeedbackText}"
                                        onclick="showFeedback(this)">反馈</button>
                                <form th:action="@{/admin/repairs/delete/{id}(id=${repair.id})}" method="post" style="display:inline-block;" onsubmit="return confirm('确定要删除吗？')">
                                    <button type="submit" class="btn btn-danger">删除</button>
                                </form>
                            </div>
                            <div th:unless="${repair.status == 'COMPLETED'}" th:if="${repair.status != 'PENDING'}">
                                <form th:action="@{/admin/repairs/delete/{id}(id=${repair.id})}" method="post" onsubmit="return confirm('确定要删除吗？')">
                                    <button type="submit" class="btn btn-danger">删除</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function showFeedback(btn) {
            const feedback = btn.getAttribute('data-feedback');
            alert('反馈内容：' + (feedback || '无'));
        }
    </script>
</body>
</html>
