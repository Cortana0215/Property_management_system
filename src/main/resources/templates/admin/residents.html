<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>住户管理 - 物业管理系统</title>
    <link rel="stylesheet" th:href="@{/css/admin.css?v=6}">
</head>
<body>
    
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>物业管理系统</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/admin/dashboard}">仪表盘</a>
            <a th:href="@{/admin/buildings}">楼栋管理</a>
            <a th:href="@{/admin/rooms}">房屋管理</a>
            <a th:href="@{/admin/residents}" class="active">住户管理</a>
            <a th:href="@{/admin/staff}">职工管理</a>
            <a th:href="@{/admin/notices}">公告管理</a>
            <a th:href="@{/admin/complaints}">投诉管理</a>
            <a th:href="@{/admin/admins}">管理员账号</a>
            <a th:href="@{/admin/repairs}">报修任务</a>
            <a th:href="@{/attendance/records}">考勤管理</a>
            <a th:href="@{/admin/user-management}">用户账号管理</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出系统</a>
        </div>
    </div>
    <div class="content">


        <h1>住户信息管理</h1>
        
        <div class="card">
            <div class="card-title">新住户开户</div>
            <form th:action="@{/admin/residents/add}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="name" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="text" name="phone" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <label>登录账号</label>
                        <input type="text" name="username" placeholder="建议使用手机号" required>
                    </div>
                    <div class="form-group">
                        <label>初始密码</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">立即开户</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="card-title">住户名册</div>
            <table>
                <colgroup>
                    <col style="width: 12%;">
                    <col style="width: 15%;">
                    <col style="width: 25%;">
                    <col style="width: 15%;">
                    <col style="width: 20%;">
                    <col style="width: 13%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>联系电话</th>
                        <th>已绑定房屋</th>
                        <th>账号</th>
                        <th>快速绑定</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="resident : ${residents}">
                        <td th:text="${resident.name}"></td>
                        <td th:text="${resident.phone}"></td>
                        <td>
                            <div th:each="room : ${resident.rooms}" style="margin-bottom: 5px; display: flex; align-items: center; gap: 8px;">
                                <span class="btn" th:text="${room.building.name} + ' ' + ${room.unitNumber} + ' - ' + ${room.roomNumber}"></span>
                                <form th:action="@{/admin/residents/unbind}" method="post" style="margin: 0;">
                                    <input type="hidden" name="residentId" th:value="${resident.id}">
                                    <input type="hidden" name="roomId" th:value="${room.id}">
                                    <button type="submit" class="btn btn-danger" style="padding: 4px 8px; font-size: 12px; height: auto; min-height: auto; margin-left: 0;">解绑</button>
                                </form>
                            </div>
                            <span th:if="${#lists.isEmpty(resident.rooms)}">未绑定</span>
                        </td>
                        <td th:text="${resident.username}"></td>
                        <td>
                            <form th:action="@{/admin/residents/bind}" method="post" style="display: flex; gap: 8px; align-items: center; margin: 0;">
                                <input type="hidden" name="residentId" th:value="${resident.id}">
                                <select name="roomId" required style="width: auto; flex: 1;">
                                    <option value="">选择空房...</option>
                                    <option th:each="r : ${vacantRooms}" th:value="${r.id}" th:text="${r.building.name} + ' ' + ${r.roomNumber}"></option>
                                </select>
                                <button type="submit" class="btn btn-success" style="white-space: nowrap; margin-left: 0;">绑定</button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/residents/delete/{id}(id=${resident.id})}" method="post" style="margin: 0;">
                                <button type="submit" class="btn btn-danger" style="margin-left: 0; white-space: nowrap;" onclick="return confirm('确定注销该住户账号吗？')">注销</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
