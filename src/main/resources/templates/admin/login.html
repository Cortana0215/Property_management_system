<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员登录 - 物业系统</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;
        }
        .login-box h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 15px;
        }
        .login-box input {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body style="margin: 0;">
    <div class="login-wrapper">
        <div class="login-box">
            <h2>管理员登录</h2>
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            <form th:action="@{/admin/login}" method="post">
                <input type="text" name="username" placeholder="管理员账号" required>
                <input type="password" name="password" placeholder="密码" required>
                <button type="submit" class="btn">登录</button>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                <a th:href="@{/login}" style="color: #3498db; text-decoration: none;">&rarr; 切换到住户登录</a>
            </div>
        </div>
    </div>
</body>
</html>
