<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>楼栋管理 - 物业管理系统</title>
    <link rel="stylesheet" th:href="@{/css/admin.css?v=2}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>物业管理系统</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/admin/dashboard}">仪表盘</a>
            <a th:href="@{/admin/buildings}" class="active">楼栋管理</a>
            <a th:href="@{/admin/rooms}">房屋管理</a>
            <a th:href="@{/admin/residents}">住户管理</a>
            <a th:href="@{/admin/staff}">职工管理</a>
            <a th:href="@{/admin/notices}">公告管理</a>
            <a th:href="@{/admin/complaints}">投诉管理</a>
            <a th:href="@{/admin/admins}">管理员账号</a>
            <a th:href="@{/admin/repairs}">报修任务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出系统</a>
        </div>
    </div>

    <div class="content">
        <h1>小区楼栋管理</h1>

        <div class="card">
            <div class="card-title">添加新楼栋</div>
            <form th:action="@{/admin/buildings/add}" method="post" class="form-row">
                <div class="form-group">
                    <label>楼栋名称</label>
                    <input type="text" name="name" required placeholder="如：1号楼">
                </div>
                <div class="form-group">
                    <label>描述备注</label>
                    <input type="text" name="description" placeholder="如：近小区东门，共18层">
                </div>
                <button type="submit" class="btn btn-primary" style="height: 34px;">立即添加</button>
            </form>
        </div>

        <div class="card">
            <div class="card-title">楼栋列表</div>
            <table>
                <colgroup>
                    <col style="width: 10%;">
                    <col style="width: 20%;">
                    <col style="width: 35%;">
                    <col style="width: 15%;">
                    <col style="width: 20%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>楼栋名称</th>
                        <th>描述</th>
                        <th>房屋统计</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${buildings}">
                        <td th:text="${b.id}"></td>
                        <td th:text="${b.name}"></td>
                        <td th:text="${b.description}" style="color: var(--text-muted);"></td>
                        <td>
                            <a th:href="@{/admin/rooms(buildingId=${b.id})}" class="btn">
                                查看房屋 (<span th:text="${#lists.size(b.rooms)}"></span>)
                            </a>
                        </td>
                        <td>
                            <form th:action="@{/admin/buildings/delete/{id}(id=${b.id})}" method="post" onsubmit="return confirm('警告：删除楼栋将同时清空所有所属房屋，是否确定？')">
                                <button type="submit" class="btn btn-danger">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
