<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>物业职工端 - 公告列表</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        .staff-header { background-color: #1a365d; color: white; padding: 20px 0; }
        .notice-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border-left: 5px solid #3498db; }
    </style>
</head>
<body>
    <header class="staff-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; font-size: 1.5rem;">物业职工端 - 内部公告</h1>
            <a th:href="@{/staff/dashboard}" style="color: white; text-decoration: none;">返回仪表盘</a>
        </div>
    </header>

    <div class="container" style="margin-top: 30px;">
        <div th:if="${#lists.isEmpty(notices)}" style="text-align: center; color: #94a3b8; margin-top: 50px;">
            暂无针对职工发布的内部公告
        </div>
        
        <div th:each="n : ${notices}" class="notice-card">
            <h3 th:text="${n.title}" style="margin-top: 0; color: #1a365d;"></h3>
            <div style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px;">
                发布时间：<span th:text="${#temporals.format(n.createTime, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div th:text="${n.content}" style="white-space: pre-wrap; color: #475569; line-height: 1.6;"></div>
        </div>
    </div>
</body>
</html>
