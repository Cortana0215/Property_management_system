<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>物业职工端 - 公告列表</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        .staff-header { background-color: #1a252f; color: white; padding: 15px 30px; }
        .notice-card { background: white; border: 1px solid var(--border-color); padding: 15px; margin-bottom: 15px; border-left: 5px solid #0056b3; }
    </style>
</head>
<body>
    <header class="staff-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; font-size: 18px;">物业职工端 - 内部公告</h1>
            <a th:href="@{/staff/dashboard}" style="color: white; text-decoration: none;">返回仪表盘</a>
        </div>
    </header>

    <div class="container" style="margin-top: 20px;">
        <div th:if="${#lists.isEmpty(notices)}" style="border: 1px solid #ccc; padding: 20px; text-align: center; color: #666;">
            暂无针对职工发布的内部公告
        </div>
        
        <div th:each="n : ${notices}" class="notice-card">
            <h3 th:text="${n.title}" style="margin-top: 0;"></h3>
            <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                发布时间：<span th:if="${n.createTime != null}" th:text="${#temporals.format(n.createTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${n.createTime != null}">-</span>
            </div>
            <div th:text="${n.content}" style="white-space: pre-wrap; font-size: 14px;"></div>
        </div>
    </div>
</body>
</html>
