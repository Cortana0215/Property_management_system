<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - 物业管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'SimSun', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            padding: 30px;
            border: 1px solid #cccccc;
            width: 100%;
            max-width: 350px;
        }
        .login-card h2 {
            font-size: 18px;
            color: #333333;
            margin-top: 0;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }
        .form-group {
            display: block;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            text-align: left;
            width: auto;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cccccc;
            box-sizing: border-box;
            font-size: 14px;
            border-radius: 0px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #0056b3;
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            background-color: #0056b3;
            color: white;
            border: 1px solid #004085;
            font-size: 14px;
            cursor: pointer;
            border-radius: 0px;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 8px;
            border: 1px solid #f5c6cb;
            margin-bottom: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>物业管理系统登录</h2>
        
        <div th:if="${error}" class="error-msg" th:text="${error}">错误消息</div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>身份角色</label>
                <select name="role" required>
                    <option value="RESIDENT">住户 (业主)</option>
                    <option value="STAFF">物业职工</option>
                    <option value="ADMIN">系统管理员</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>账号</label>
                <input type="text" name="username" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-primary">登 录</button>
        </form>
    </div>
</body>
</html>
