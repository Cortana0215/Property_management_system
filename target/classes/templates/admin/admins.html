<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>物业管理后台 - 管理员管理</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="sidebar">
        <h2>物业管理系统</h2>
        <a th:href="@{/admin/dashboard}">仪表盘</a>
        <a th:href="@{/admin/buildings}">小区楼栋管理</a>
        <a th:href="@{/admin/rooms}">房屋信息管理</a>
        <a th:href="@{/admin/residents}">住户信息管理</a>
        <a th:href="@{/admin/staff}">职工信息管理</a>
        <a th:href="@{/admin/admins}">管理员账号管理</a>
        <a th:href="@{/admin/repairs}">报修任务管理</a>
        <a th:href="@{/logout}" style="margin-top: 50px; background-color: #c0392b;">退出登录</a>
    </div>

    <div class="content">
        <h1>管理员账号管理</h1>
        
        <div class="form-container">
            <h3>添加新管理员</h3>
            <form th:action="@{/admin/admins/add}" method="post">
                <input type="text" name="username" placeholder="登录账号" required>
                <input type="password" name="password" placeholder="登录密码" required>
                <button type="submit" class="btn">添加</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>登录账号</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="admin : ${admins}">
                    <td th:text="${admin.id}">1</td>
                    <td th:text="${admin.username}">admin</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
