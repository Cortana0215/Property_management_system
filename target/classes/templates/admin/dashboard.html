<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理后台 - 仪表盘</title>
    <link rel="stylesheet" th:href="@{/css/admin.css?v=2}">
</head>
<body>
    
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>物业管理系统</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/admin/dashboard}" class="active">仪表盘</a>
            <a th:href="@{/admin/buildings}">楼栋管理</a>
            <a th:href="@{/admin/rooms}">房屋管理</a>
            <a th:href="@{/admin/residents}">住户管理</a>
            <a th:href="@{/admin/staff}">职工管理</a>
            <a th:href="@{/admin/notices}">公告管理</a>
            <a th:href="@{/admin/complaints}">投诉管理</a>
            <a th:href="@{/admin/admins}">管理员账号</a>
            <a th:href="@{/admin/repairs}">报修任务</a>
            <a th:href="@{/attendance/records}">考勤管理</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出系统</a>
        </div>
    </div>
    <div class="content">


        <div th:if="${message}" class="alert alert-success" th:text="${message}" style="background: #c6f6d5; color: #22543d; padding: 10px; border-radius: 4px; margin-bottom: 20px;"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}" style="background: #fed7d7; color: #822727; padding: 10px; border-radius: 4px; margin-bottom: 20px;"></div>

        <h1>仪表盘概览</h1>
        
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">总住户数</div>
                <div class="stat-value" th:text="${residentCount}">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">总职工数</div>
                <div class="stat-value" th:text="${staffCount}">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">待处理报修</div>
                <div class="stat-value" th:text="${pendingRepairs}">0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">今日考勤</div>
            <div th:if="${activeAttendance == null}" style="display: flex; align-items: center; justify-content: space-between;">
                <span>您当前处于 <strong>离岗</strong> 状态。</span>
                <form th:action="@{/attendance/clock-in}" method="post">
                    <button type="submit" class="btn btn-primary attendance-btn">打卡上班</button>
                </form>
            </div>
            <div th:if="${activeAttendance != null}">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                    <span>您当前处于 <strong>在岗</strong> 状态。</span>
                    <form th:action="@{/attendance/clock-out}" method="post">
                        <button type="submit" class="btn btn-primary attendance-btn" style="background: linear-gradient(135deg, #718096 0%, #4A5568 100%);">打卡下班</button>
                    </form>
                </div>
                <p>上班打卡时间：<span th:text="${#temporals.format(activeAttendance.clockInTime, 'yyyy-MM-dd HH:mm:ss')}"></span> 
                   <span th:class="${activeAttendance.clockInStatus == '迟到' ? 'status-tag status-pending' : 'status-tag status-completed'}" 
                         th:text="${activeAttendance.clockInStatus}"></span>
                </p>
            </div>
        </div>

        <div class="card">
            <div class="card-title">系统状态</div>
            <p>欢迎回来，管理员 <strong><span th:text="${session.loggedInAdmin.username}">admin</span></strong>。</p>
            <p style="color: var(--text-muted); font-size: 14px;">当前系统运行正常，所有模块已就绪。您可以通过左侧菜单管理小区资产、住户及报修任务。</p>
        </div>

        <div class="card">
            <div class="card-title">快捷入口</div>
            <div class="stats-grid">
                <a th:href="@{/admin/notices}" class="btn btn-primary" style="flex: 1; text-align: center; padding: 15px;">发布新公告</a>
                <a th:href="@{/admin/residents}" class="btn btn-primary" style="flex: 1; text-align: center; padding: 15px;">住户开户</a>
                <a th:href="@{/admin/rooms}" class="btn btn-primary" style="flex: 1; text-align: center; padding: 15px;">新增房屋档案</a>
                <a th:href="@{/admin/staff}" class="btn btn-primary" style="flex: 1; text-align: center; padding: 15px;">录入职工</a>
            </div>
        </div>
    </div>
</body>
</html>
