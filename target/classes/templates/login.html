<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - 物业管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }
        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }
        .login-card h2 {
            font-size: 24px;
            color: var(--text);
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-size: 15px;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #F9FAFB;
            color: var(--text);
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(79, 70, 229, 0.3);
        }
        .error-msg {
            background: #FEF2F2;
            color: #B91C1C;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #FCA5A5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>系统登录</h2>
        
        <div th:if="${error}" class="error-msg" th:text="${error}">错误消息</div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>身份角色</label>
                <select name="role" required>
                    <option value="RESIDENT">住户 (业主)</option>
                    <option value="STAFF">物业职工</option>
                    <option value="ADMIN">系统管理员</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>账号</label>
                <input type="text" name="username" placeholder="请输入账号" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="btn-primary">登 录</button>
        </form>
    </div>
</body>
</html>
