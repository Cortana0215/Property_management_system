<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - 物业管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        body {
            background: linear-gradient(135deg, #1a365d 0%, #3498db 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-card h2 {
            font-size: 1.8rem;
            color: #1a365d;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .login-card p {
            color: #7f8c8d;
            margin-bottom: 35px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2c3e50;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 1rem;
        }
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }
        .error-msg {
            background: #fff5f5;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>欢迎回来</h2>
        <p>请登录以访问物业服务系统</p>
        
        <div th:if="${error}" class="error-msg" th:text="${error}">错误消息</div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>身份角色</label>
                <select name="role" required>
                    <option value="RESIDENT">住户 (业主)</option>
                    <option value="STAFF">物业职工</option>
                    <option value="ADMIN">系统管理员</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>账号</label>
                <input type="text" name="username" placeholder="请输入您的账号" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入您的密码" required>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 16px; margin-top: 10px; font-size: 1.1rem; border-radius: 12px;">立即登录</button>
        </form>
    </div>
</body>
</html>
