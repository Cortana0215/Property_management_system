<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - 物业管理平台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .login-logo p {
            color: #7f8c8d;
        }
        .error-message {
            color: #e74c3c;
            background-color: #fde8e7;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-login:hover {
            background-color: #2980b9;
        }
        .security-note {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">
                <h1>物业管理平台</h1>
                <p>请选择您的身份登录</p>
            </div>
            
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>登录身份</label>
                    <select name="role" required>
                        <option value="RESIDENT">小区住户</option>
                        <option value="STAFF">物业职工</option>
                        <option value="ADMIN">物业管理员</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn-login">安全登录</button>
            </form>
            
            <div class="security-note">
                <p>安全连接已开启 | 请妥善保管您的账号密码</p>
            </div>
        </div>
    </div>
</body>
</html>
