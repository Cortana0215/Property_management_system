<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
    </style>
</head>
<body>
    <div class="navbar">
        <h1>个人中心</h1>
        <a th:href="@{/}" style="color: white; text-decoration: none;">返回首页</a>
    </div>
    
    <div class="container">
        <div class="form-container-centered">
            <h2 style="margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 20px;">账户资料管理</h2>
            
            <form th:action="@{/profile/update}" method="post">
                <div class="form-group">
                    <label>住户姓名</label>
                    <input type="text" name="name" th:value="${resident.name}" required>
                </div>
                
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="tel" name="phone" th:value="${resident.phone}" required>
                </div>

                <div class="form-group">
                    <label>登录账号 (不可更改)</label>
                    <div class="form-control-static" th:text="${resident.username}">username</div>
                </div>

                <div class="form-group">
                    <label>已绑定房产</label>
                    <div class="form-control-static">
                        <span th:each="room : ${resident.rooms}" class="room-badge" 
                              th:text="${room.building.name} + ' ' + ${room.unitNumber} + ' ' + ${room.roomNumber}" style="margin-right: 5px;"></span>
                        <span th:if="${#lists.isEmpty(resident.rooms)}" style="color: #666; font-size: 12px;">暂未绑定正式房产</span>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 30px; padding-top: 15px; border-top: 1px dashed #ccc;">
                    <label>安全设置：修改密码</label>
                    <input type="password" name="password" placeholder="如需修改请输入新密码，否则请留空">
                </div>
                
                <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn-primary" style="width: 150px;">确认保存修改</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
