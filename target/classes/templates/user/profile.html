<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        .info-group {
            margin-bottom: 25px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }
        .info-group label {
            display: block;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .info-group div {
            font-size: 1.1rem;
            color: #1e293b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>个人中心</h1>
        <div>
            <a th:href="@{/}" style="color: white; text-decoration: none; font-weight: 600;">返回首页</a>
        </div>
    </div>
    
    <div class="container">
        <div class="form-container-centered">
            <h2 style="margin-top: 0; color: #1a365d; margin-bottom: 30px;">账户资料管理</h2>
            
            <form th:action="@{/profile/update}" method="post">
                <div class="form-group">
                    <label>住户姓名</label>
                    <input type="text" name="name" th:value="${resident.name}" required class="input-sm">
                </div>
                
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="tel" name="phone" th:value="${resident.phone}" required class="input-sm">
                </div>

                <div class="info-group">
                    <label>登录账号 (不可更改)</label>
                    <div th:text="${resident.username}">username</div>
                </div>

                <div class="info-group">
                    <label>已绑定房产</label>
                    <div style="margin-top: 10px;">
                        <span th:each="room : ${resident.rooms}" class="room-badge" 
                              th:text="${room.building.name} + ' ' + ${room.unitNumber} + ' ' + ${room.roomNumber}"></span>
                        <span th:if="${#lists.isEmpty(resident.rooms)}" style="color: #94a3b8; font-size: 0.9rem;">暂未绑定正式房产</span>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
                    <label>安全设置：修改密码</label>
                    <input type="password" name="password" placeholder="如需修改请输入新密码，否则请留空">
                </div>
                
                <div style="margin-top: 30px;">
                    <button type="submit" class="btn-primary" style="width: 100%;">确认保存修改</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
