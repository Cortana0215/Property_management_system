<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投诉建议 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=6}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>智慧物业 - 住户端</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/}">服务大厅</a>
            <a th:href="@{/profile}">个人资料</a>
            <a th:href="@{/report}">设施报修</a>
            <a th:href="@{/complaints}">投诉建议</a>
            <a th:href="@{/notices}">社区公告</a>
            <a th:href="@{/services}">便民服务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出登录</a>
        </div>
    </div>
    <div class="content">
        <h1>投诉与建议</h1>

        <div style="margin-bottom: 30px;">
            <a th:href="@{/complaint/new}" class="btn btn-primary" style="padding: 12px 24px; font-size: 15px;">+ 发起新投诉/建议</a>
        </div>

        <div th:if="${#lists.isEmpty(complaints)}" class="empty-state">
            暂无历史投诉与建议记录
        </div>
        
        <div th:each="c : ${complaints}" class="card">
            <div th:class="'status-tag ' + ${c.status == 'RESOLVED' ? 'status-completed' : 'status-pending'}" 
                 th:text="${c.status == 'PENDING' ? '待处理' : (c.status == 'PROCESSING' ? '处理中' : '已解决')}"></div>
            
            <h3 th:text="${c.title}">标题</h3>
            <p th:text="${c.content}" style="font-size: 14px; margin: 10px 0;"></p>
            <div style="font-size: 12px; color: #666;">提交时间：<span th:if="${c.submitTime != null}" th:text="${#temporals.format(c.submitTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${c.submitTime != null}">-</span></div>
            
            <div th:if="${c.status == 'RESOLVED'}" style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <div style="font-size: 14px; margin-bottom: 5px;"><strong>物业回复：</strong></div>
                <div th:text="${c.resultFeedback}" style="font-size: 14px; color: #333;">回复内容...</div>
            </div>
        </div>
    </div>
</body>
</html>
