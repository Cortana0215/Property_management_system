<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新建投诉建议 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
    <div class="navbar">
        <h1>提交投诉或建议</h1>
        <a th:href="@{/complaints}" style="color: white; text-decoration: none;">返回列表</a>
    </div>
    
    <div class="container">
        <div class="form-container-centered">
            <h2 style="margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">写下您的反馈</h2>
            
            <form th:action="@{/complaint/submit}" method="post">
                <div class="form-group">
                    <label>主题摘要</label>
                    <input type="text" name="title" required placeholder="如：电梯卫生建议、邻里噪音投诉等">
                </div>
                
                <div class="form-group">
                    <label>详细内容</label>
                    <textarea name="content" rows="6" required placeholder="请详细描述您的问题或建议..."></textarea>
                </div>
                
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="margin-right: 10px;">确认提交</button>
                    <a th:href="@{/complaints}" class="btn-primary" style="background: #e9ecef; color: #333; border-color: #ccc;">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
