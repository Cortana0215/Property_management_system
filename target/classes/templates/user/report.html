<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公共设施报修 - 物业服务</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
    <div class="navbar">
        <h1>公共设施报修</h1>
    </div>
    
    <div class="container">
        <p>请详细描述您发现的设施损坏情况，以便我们尽快安排人员维修。</p>
        
        <form th:action="@{/report}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>您的姓名</label>
                <input type="text" name="submitterName" th:value="${session.loggedInUser.name}" readonly required>
            </div>
            
            <div class="form-group">
                <label>联系电话</label>
                <input type="text" name="contactPhone" th:value="${session.loggedInUser.phone}" required>
            </div>
            
            <div class="form-group">
                <label>损坏情况描述</label>
                <textarea name="facilityDescription" required placeholder="请说明损坏设施的位置和具体情况..."></textarea>
            </div>

            <div class="form-group">
                <label>上传照片 (可选)</label>
                <input type="file" name="image" accept="image/*" style="margin-top: 5px;">
            </div>
            
            <button type="submit" class="btn-primary">提交报修</button>
        </form>
        
        <a th:href="@{/}" class="back-link">&larr; 返回首页</a>
    </div>
</body>
</html>
