<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>提交报修 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
    <div class="navbar">
        <h1>设施在线报修</h1>
        <a th:href="@{/}" style="color: white; text-decoration: none;">返回首页</a>
    </div>
    
    <div class="container">
        <div class="form-container-centered">
            <h2 style="margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">申报故障</h2>
            
            <form th:action="@{/report}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>报修人</label>
                    <input type="text" name="submitterName" th:value="${session.loggedInUser.name}" readonly style="background-color: #eee;">
                </div>
                
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="tel" name="contactPhone" th:value="${session.loggedInUser.phone}" required placeholder="请输入您的联系方式">
                </div>
                
                <div class="form-group">
                    <label>故障描述</label>
                    <textarea name="facilityDescription" required rows="4" placeholder="请说明损坏设施的具体位置及详细情况..."></textarea>
                </div>

                <div class="form-group">
                    <label>上传照片证据</label>
                    <input type="file" name="image" accept="image/*" style="border: none; padding: 0;">
                </div>
                
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="margin-right: 10px;">提交报修工单</button>
                    <a th:href="@{/}" class="btn-primary" style="background: #e9ecef; color: #333; border-color: #ccc;">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
