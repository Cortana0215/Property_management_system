<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>便民服务 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=3}">
    <style>
        .service-card {
            background: white;
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
        }
        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #ccc;
        }
        .contact-item:last-child { border-bottom: none; }
        .contact-name { font-weight: bold; }
        .contact-number { font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>智慧物业 - 住户端</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/}">服务大厅</a>
            <a th:href="@{/profile}">个人资料</a>
            <a th:href="@{/report}">设施报修</a>
            <a th:href="@{/complaints}">投诉建议</a>
            <a th:href="@{/notices}">社区公告</a>
            <a th:href="@{/services}">便民服务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出登录</a>
        </div>
    </div>
    <div class="content">

        <div class="service-card">
            <h3 style="margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">物业服务电话</h3>
            <div class="contact-item">
                <span class="contact-name">物业服务中心 (24小时)</span>
                <span class="contact-number">010-8888-9999</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">报修中心</span>
                <span class="contact-number">010-8888-1111</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">安保/监控中心</span>
                <span class="contact-number">010-8888-2222</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">投诉处理部</span>
                <span class="contact-number">010-8888-3333</span>
            </div>
        </div>

        <div class="service-card">
            <h3 style="margin-top: 0; border-bottom: 2px solid #dc3545; padding-bottom: 10px;">紧急求助电话</h3>
            <div class="contact-item">
                <span class="contact-name">火警报警</span>
                <span class="contact-number">119</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">医疗救护</span>
                <span class="contact-number">120</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">治安报警</span>
                <span class="contact-number">110</span>
            </div>
        </div>

        <div class="service-card">
            <h3 style="margin-top: 0; border-bottom: 2px solid #28a745; padding-bottom: 10px;">周边生活服务</h3>
            <div class="contact-item">
                <span class="contact-name">附近社区医院</span>
                <span class="contact-number">010-1234-5678</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">顺丰快递 (本区域)</span>
                <span class="contact-number">95338</span>
            </div>
            <div class="contact-item">
                <span class="contact-name">小区便利店 (送货上门)</span>
                <span class="contact-number">138-0000-0001</span>
            </div>
        </div>
    </div>
</body>
</html>
