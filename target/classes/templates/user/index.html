<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>住户服务门户 - 智慧物业</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=6}">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>智慧物业 - 住户端</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/}">服务大厅</a>
            <a th:href="@{/profile}">个人资料</a>
            <a th:href="@{/report}">设施报修</a>
            <a th:href="@{/complaints}">投诉建议</a>
            <a th:href="@{/notices}">社区公告</a>
            <a th:href="@{/services}">便民服务</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出登录</a>
        </div>
    </div>
    <div class="content">
        <h1>服务大厅</h1>

        <!-- 欢迎卡片 -->
        <div class="card welcome-card">
            <div class="welcome-text">
                <h2 style="color: var(--primary-color);">下午好，<span th:text="${session.loggedInUser.name}">住户</span></h2>
                <div class="property-info">
                    <strong>房产信息：</strong>
                    <span th:each="room : ${myRooms}" class="room-badge" th:text="${room.building.name} + ' ' + ${room.roomNumber}"></span>
                    <span th:if="${#lists.isEmpty(myRooms)}" style="color: var(--danger);">暂未绑定房产，请联系物业。</span>
                </div>
            </div>
            <a th:href="@{/profile}" class="btn btn-primary" style="margin-top: 10px; margin-left: 0;">管理个人资料</a>
        </div>
        
        <!-- 功能网格 -->
        <div class="action-grid">
            <a th:href="@{/report}" class="action-tile">
                <h3>设施报修</h3>
                <p>快捷上报 实时追踪</p>
            </a>
            <a th:href="@{/complaints}" class="action-tile">
                <h3>投诉建议</h3>
                <p>您的意见 我们的动力</p>
            </a>
            <a th:href="@{/services}" class="action-tile">
                <h3>便民服务</h3>
                <p>常用电话 一键拨打</p>
            </a>
        </div>

        <!-- 社区公告展示区 -->
        <div class="card" style="margin-bottom: 30px;" th:if="${notices != null && !#lists.isEmpty(notices)}">
            <h3 style="border-bottom: 2px solid #ccc; padding-bottom: 10px;">最新社区公告</h3>
            <div th:each="n : ${notices}" class="notice-card">
                <h4 style="margin: 0 0 10px 0; color: #0056b3;" th:text="${n.title}"></h4>
                <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                    发布时间：<span th:if="${n.createTime != null}" th:text="${#temporals.format(n.createTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${n.createTime != null}">-</span>
                </div>
                <div style="font-size: 14px; white-space: pre-wrap;" th:text="${n.content}"></div>
            </div>
        </div>

        <!-- 报修记录 -->
        <div class="request-list">
            <h3 style="border-bottom: 2px solid #ccc; padding-bottom: 10px;">近期报修进度</h3>
            <div th:if="${#lists.isEmpty(myRequests)}" class="empty-state">
                目前没有报修记录
            </div>
            <div th:each="req : ${myRequests}" class="card">
                <div th:class="'status-tag ' + ${req.status == 'COMPLETED' ? 'status-completed' : (req.status == 'ASSIGNED' ? 'status-assigned' : 'status-pending')}" 
                     th:text="${req.status == 'COMPLETED' ? '已完结' : (req.status == 'ASSIGNED' ? '处理中' : '待指派')}">状态</div>
                
                <h3 th:text="${req.facilityDescription}">描述</h3>
                <div style="font-size: 14px; color: #666;">提交时间：<span th:if="${req.submitTime != null}" th:text="${#temporals.format(req.submitTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${req.submitTime != null}">-</span></div>
                
                <div th:if="${req.status == 'COMPLETED'}" style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                    <div style="font-size: 14px; margin-bottom: 5px;"><strong>物业反馈：</strong> <span th:text="${req.staffFeedbackText}">处理结果...</span></div>
                    
                    <div th:if="${req.rating == null}" style="margin-top: 15px;">
                        <form th:action="@{/repair/rate/{id}(id=${req.id})}" method="post">
                            <div class="form-group">
                                <label>服务评价：</label>
                                <select name="rating" required>
                                    <option value="5">5星 (非常满意)</option>
                                    <option value="4">4星 (满意)</option>
                                    <option value="3">3星 (一般)</option>
                                    <option value="2">2星 (不满意)</option>
                                    <option value="1">1星 (非常不满意)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <textarea name="feedback" placeholder="写下您的评价内容..." rows="2"></textarea>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">提交评价</button>
                            </div>
                        </form>
                    </div>
                    <div th:if="${req.rating != null}" style="margin-top: 10px; font-size: 14px; color: #28a745;">
                        <strong>我的评分：</strong> <span th:text="${req.rating} + ' 星'"></span>
                        <div style="color: #666; margin-top: 5px;" th:text="'“' + ${req.residentFeedback} + '”'"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
