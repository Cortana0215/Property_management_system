<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>物业职工端 - 我的任务</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <style>
        .staff-header {
            background-color: #1a252f;
            color: white;
            padding: 15px 30px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header class="staff-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>物业职工端</h1>
            <div>
                <a th:href="@{/staff/notices}" style="color: #ecf0f1; text-decoration: none; margin-right: 20px; font-weight: 600;">内部公告</a>
                <span th:text="${session.loggedInStaff.name}">职工</span> | 
                <a th:href="@{/logout}" style="color: #ecf0f1; text-decoration: none;">退出</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h2>待处理任务</h2>
        <div th:if="${#lists.isEmpty(myTasks)}" style="color: #666;">
            目前没有指派给您的新任务。
        </div>
        
        <div th:each="task : ${myTasks}" class="request-card">
            <div class="status-tag status-assigned">待处理</div>
            <h3 th:text="${task.facilityDescription}">报修项</h3>
            <p><strong>报修人:</strong> <span th:text="${task.submitterName}"></span> (<span th:text="${task.contactPhone}"></span>)</p>
            <p><strong>提交时间:</strong> <span th:text="${#temporals.format(task.submitTime, 'yyyy-MM-dd HH:mm')}"></span></p>
            <div th:if="${task.imagePath}">
                <p><strong>现场照片:</strong></p>
                <img th:src="${task.imagePath}" style="max-width: 200px; border: 1px solid #ccc; cursor: pointer;" onclick="window.open(this.src)">
            </div>
            
            <div style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 15px;">
                <h4>提交处理反馈</h4>
                <form th:action="@{/staff/tasks/complete/{id}(id=${task.id})}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <textarea name="feedback" placeholder="请描述处理结果..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>上传完成照片</label>
                        <input type="file" name="image" accept="image/*" required style="border: none; padding: 0;">
                    </div>
                    <button type="submit" class="btn-primary">提交反馈并完结任务</button>
                </form>
            </div>
        </div>

        <h2 style="margin-top: 40px;">已完成任务</h2>
        <div th:each="task : ${completedTasks}" class="request-card" style="opacity: 0.8;">
            <div class="status-tag status-completed">已完成</div>
            <h3 th:text="${task.facilityDescription}">报修项</h3>
            <p><strong>完成时间:</strong> <span th:text="${#temporals.format(task.completeTime, 'yyyy-MM-dd HH:mm')}"></span></p>
            <p><strong>您的反馈:</strong> <span th:text="${task.staffFeedbackText}"></span></p>
            <img th:if="${task.staffFeedbackImage}" th:src="${task.staffFeedbackImage}" style="max-width: 150px; border: 1px solid #ccc;">
        </div>
    </div>
</body>
</html>
