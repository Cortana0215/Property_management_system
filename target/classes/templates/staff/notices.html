<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>物业职工端 - 公告列表</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=3}">
    <style>
        .notice-card { background: white; border: 1px solid var(--border-color); padding: 15px; margin-bottom: 15px; border-left: 5px solid #2563EB; border-radius: 8px; box-shadow: var(--shadow); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>智慧物业 - 职工端</h2>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/staff/dashboard}">我的任务</a>
            <a th:href="@{/attendance/records}">我的考勤</a>
            <a th:href="@{/staff/notices}" class="active">内部公告</a>
            <a th:href="@{/logout}" style="margin-top: 40px; color: #f56565;">退出登录</a>
        </div>
    </div>
    <div class="content">
        <h1>内部公告</h1>

        <div th:if="${#lists.isEmpty(notices)}" class="card" style="text-align: center; color: #666;">
            暂无针对职工发布的内部公告
        </div>
        
        <div th:each="n : ${notices}" class="notice-card">
            <h3 th:text="${n.title}" style="margin-top: 0; color: #2563EB;"></h3>
            <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                发布时间：<span th:if="${n.createTime != null}" th:text="${#temporals.format(n.createTime, 'yyyy-MM-dd HH:mm')}"></span><span th:unless="${n.createTime != null}">-</span>
            </div>
            <div th:text="${n.content}" style="white-space: pre-wrap; font-size: 14px;"></div>
        </div>
    </div>
</body>
</html>
